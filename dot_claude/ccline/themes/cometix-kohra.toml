theme = "cometix-kohra"

# Kohra — cool fog-grey monochrome with a single blue accent (#78accf).
# Faithful to Kohra's identity: the model segment carries the one chromatic
# note (blue), and the rest step down through Kohra's neutral grey ramp as a
# pure luminance hierarchy — fg_bright #d3d8da → fg #babec1 → mid #828689.
# Greys from the Kohra cross-app palette (dot_config/ghostty/themes/kohra-ghostty).

[style]
mode = "nerd_font"
separator = " | "

# model — Kohra signature blue (#78accf), the anchor segment
[[segments]]
id = "model"
enabled = true

[segments.icon]
plain = "🤖"
nerd_font = ""

[segments.colors.icon]
r = 120
g = 172
b = 207

[segments.colors.text]
r = 120
g = 172
b = 207

[segments.styles]
text_bold = true

[segments.options]

# directory — fog_bright #d3d8da, the brightest neutral (the "where")
[[segments]]
id = "directory"
enabled = true

[segments.icon]
plain = "📁"
nerd_font = "󰉋"

[segments.colors.icon]
r = 211
g = 216
b = 218

[segments.colors.text]
r = 211
g = 216
b = 218

[segments.styles]
text_bold = true

[segments.options]

# git — fog #babec1, the body neutral
[[segments]]
id = "git"
enabled = true

[segments.icon]
plain = "🌿"
nerd_font = "󰊢"

[segments.colors.icon]
r = 186
g = 190
b = 193

[segments.colors.text]
r = 186
g = 190
b = 193

[segments.styles]
text_bold = true

[segments.options]
show_sha = false

# context_window — mid grey #828689, the quietest step (just a meter)
[[segments]]
id = "context_window"
enabled = true

[segments.icon]
plain = "⚡️"
nerd_font = ""

[segments.colors.icon]
r = 130
g = 134
b = 137

[segments.colors.text]
r = 130
g = 134
b = 137

[segments.styles]
text_bold = true

[segments.options]

# --- disabled segments (kept for parity with cometix) ---

[[segments]]
id = "usage"
enabled = false

[segments.icon]
plain = "📊"
nerd_font = "󰪞"

[segments.colors.icon]
c16 = 14

[segments.colors.text]
c16 = 14

[segments.styles]
text_bold = false

[segments.options]
api_base_url = "https://api.anthropic.com"
timeout = 2
cache_duration = 180

[[segments]]
