theme = "cometix-vesper"

[style]
mode = "nerd_font"
separator = " | "

# model — muted teal (Vesper aqua, desaturated toward warm grey)
[[segments]]
id = "model"
enabled = true

[segments.icon]
plain = "🤖"
nerd_font = ""

[segments.colors.icon]
r = 155
g = 213
b = 192

[segments.colors.text]
r = 155
g = 213
b = 192

[segments.styles]
text_bold = true

[segments.options]

# directory — amber icon / sage text
[[segments]]
id = "directory"
enabled = true

[segments.icon]
plain = "📁"
nerd_font = "󰉋"

[segments.colors.icon]
r = 217
g = 179
b = 147

[segments.colors.text]
r = 165
g = 197
b = 151

[segments.styles]
text_bold = true

[segments.options]

# git — muted lavender (Vesper purple)
[[segments]]
id = "git"
enabled = true

[segments.icon]
plain = "🌿"
nerd_font = "󰊢"

[segments.colors.icon]
r = 183
g = 158
b = 199

[segments.colors.text]
r = 183
g = 158
b = 199

[segments.styles]
text_bold = true

[segments.options]
