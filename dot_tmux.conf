# Claude Code terminal integration: synchronized-output passthrough (prevents
# flicker during rapid TUI redraws) and extended keys (lets Shift+Enter reach
# Claude Code instead of being swallowed as plain Enter).
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# workmux: keyboard-only dashboard/sidebar, no mouse needed.
bind C-s display-popup -h 30 -w 100 -E "workmux dashboard"
bind C-w display-popup -h 30 -w 100 -E "workmux dashboard --tab worktrees"
bind C-t run-shell "workmux sidebar"
