# ~/.config/starship.toml
# Pure-style two-line prompt, no segments, terminal palette aware

add_newline = true

format = """
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style) "
read_only = " 󰌾"

[git_branch]
symbol = ""
style  = "dimmed white"
format = "on [$symbol$branch]($style) "

[git_status]
style   = "yellow"
format  = "[$all_status$ahead_behind]($style) "
ahead     = "⇡${count}"
behind    = "⇣${count}"
diverged  = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed   = "$"
modified  = "*"
staged    = "+"
renamed   = "»"
deleted   = "✘"
conflicted = "!"

[cmd_duration]
min_time = 2000
style    = "dimmed yellow"
format   = "took [$duration]($style) "

# Mute language-version modules. Add back individually if you want them.
[package]
disabled = true
[nodejs]
disabled = true
[python]
disabled = true
[rust]
disabled = true
[golang]
disabled = true
